interface:
  display_name: "Parallels VM"
  short_description: "Control Parallels VMs with prlctl plus macOS, Linux, and native Windows guest wrappers for OpenClaw installs, setup-aware smoke runs, update verification, onboarding probes, gateway probing, and embedded-agent hatch checks."
  default_prompt: "Use $parallels-vm to automate or inspect Parallels Desktop VMs on a macOS host. Prefer prlctl first, choose `prl-macos-*` for macOS guests, `prl-linux-*` for Linux guests, and `prl-windows-*` for native Windows guests. For the quickest end-to-end OpenClaw proof on any guest, start with `prl-openclaw-smoke.sh`; it auto-detects the guest OS, can do the setup step first (`--install-version` on macOS/Linux, `--install-version` or `--install-spec` on Windows, fast current-build `--overlay-source-dir` on Windows), can pin a model, runs a local embedded hatch, and can bring up enough gateway state to run a non-local agent reply too. Use the OS-specific wrappers when you need installer/update/service detail. Rely on the Windows installer/user-local portable Git path to avoid admin prompts, wait for `prlctl exec --current-user whoami` after Windows boots, treat `NT AUTHORITY\\\\SYSTEM` from plain guest exec plus black reboot screenshots as \"guest awake, desktop user not ready yet\", use host-served cache-busted tgz files for pre-release Windows update tests, prefer isolated Windows `--prefix` installs for host-served tgz smoke because they avoid stale `%APPDATA%\\\\npm` trees and missing `openclaw.cmd` shims, prefer the built-in skip-reinstall fast path in `prl-windows-openclaw-update-verify.sh` for repeat runs, and when a Windows guest already has a working global install prefer `prl-openclaw-smoke.sh --overlay-source-dir C:\\\\Mac\\\\Home\\\\...\\\\package` or `prl-windows-overlay-openclaw.sh --source-dir ...` over guest-side npm reinstall because that path is much faster and more reliable. Do not trust raw unpacked tgz execution on Windows because it can miss runtime deps. Use `prl-windows-onboard-verify.sh` when the question is specifically about native onboarding, treat embedded hatch and gateway service as separate checks, remember that no-daemon onboarding health failures are expected without a running gateway, surface concrete `schtasks` failures as the native Windows daemon-install blocker, and if wrapper output is silent check direct side effects like `C:\\\\Users\\\\<user>\\\\.openclaw\\\\gateway.cmd`, the Startup-folder login item, and `netstat -ano | findstr 18789` before declaring failure. Use the encoded PowerShell wrapper path instead of raw host-shell `powershell -Command \"$...\"` when guest `$env:` variables matter, prefer prefix-backed `prl-windows-openclaw.sh` runs when Parallels `--current-user` is flaky, fall back to detached manual gateway probes when service/bootstrap paths are broken, use guest-native control second, and Peekaboo only when host-side GUI automation is required."
